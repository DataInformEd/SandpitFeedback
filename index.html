<!DOCTYPE html>
<html>
<head>
  <title>Pulse Point</title>
  <style>
    /* Add your existing CSS here */
    .hidden { display: none; }
  </style>
</head>
<body>

  <div id="logoBox">
    </div>

  <div id="formContent">
    <form id="feedbackForm" method="POST" action="https://script.google.com/macros/s/AKfycbxJBLq2z93Ih6wpftEz7TfMFqa5qleXOKsnF8nj9mO_UPI-_aJoT3sTpE51c8Eyh0H2/exec" target="hidden_iframe" onsubmit="return handleFormSubmit(this)">
      
      <input type="hidden" name="tag" id="tagInput" value="">
      <input type="hidden" name="isAnonymous" id="isAnonymousInput" value="false">
      <input type="hidden" name="emailSubject" id="emailSubjectInput" value="">
      <input type="hidden" name="emailBody" id="emailBodyInput" value="">

      <div id="userDetails">
        <label>Name:</label>
        <input type="text" name="userName" id="userNameInput" required>
        <br>
        <label>Email:</label>
        <input type="email" name="emailId" id="emailInput" required>
      </div>

      <div id="questionsContainer">
        </div>

      <button type="submit" id="submitBtn">Submit</button>
    </form>
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
  </div>

  <div id="successMsg" class="hidden">
    <h2>Thank You</h2>
    <div id="resourceContainer" class="hidden">
      <p id="resourceText"></p>
    </div>
  </div>

  <script>
    let currentSessionData = {};
    let questionsConfig = []; // Array of objects {id, type, isOptional}

    window.onload = function() {
      // 1. Grab the tag from URL
      const urlParams = new URLSearchParams(window.location.search);
      const tag = urlParams.get('tag') || 'General Feedback';
      document.getElementById('tagInput').value = tag;

      // 2. Fetch config from Apps Script
      // Replace with your actual Web App URL
      const appsScriptUrl = "https://script.google.com/macros/s/AKfycbxJBLq2z93Ih6wpftEz7TfMFqa5qleXOKsnF8nj9mO_UPI-_aJoT3sTpE51c8Eyh0H2/exec"; 
      
      fetch(appsScriptUrl + "?tag=" + encodeURIComponent(tag))
        .then(response => response.json())
        .then(data => {
          currentSessionData = data.sessionData;
          document.getElementById('emailSubjectInput').value = currentSessionData.emailSubject || "";
          document.getElementById('emailBodyInput').value = currentSessionData.emailBody || "";

          // THE ANONYMOUS TOGGLE
          if (currentSessionData.isAnonymous) {
            // Flip the circuit breaker flag for the backend
            document.getElementById('isAnonymousInput').value = "true"; 
            
            // Hide and fill the user details
            document.getElementById('userDetails').style.display = 'none';
            document.getElementById('userNameInput').value = "Anonymous";
            document.getElementById('emailInput').value = "anonymous@school.com";
            
            // Remove required attributes so the hidden fields don't block submission
            document.getElementById('userNameInput').removeAttribute('required');
            document.getElementById('emailInput').removeAttribute('required');
          }

          renderQuestions(currentSessionData.questions);
        });
    };

    function renderQuestions(questionsArray) {
      const container = document.getElementById('questionsContainer');
      
      // Example rendering loop (adapt to your specific question parsing logic)
      questionsArray.forEach((qText, i) => {
        // Simple example assuming text questions for structure
        // In your real code, this parses the string to determine if it's a slider, MCQ, etc.
        const isOptional = qText.includes("[OPTIONAL]"); // Adjust based on your syntax
        
        let html = `<div class="question-block">
          <input type="hidden" name="q_text_${i}" value="${qText}">
          <label>${qText}</label>`;
          
        // SLIDER SENTINEL EXAMPLE
        if (qText.includes("[SLIDER]")) {
           // Set the initial value to a float (e.g., 5.1)
           // If the user touches it, oninput rounds it to an integer.
           html += `<input type="range" min="1" max="10" step="0.1" value="5.1" 
                           id="q_val_${i}" name="q_val_${i}" 
                           oninput="this.step=1; this.value=Math.round(this.value);" required>`;
        } else {
           html += `<input type="text" id="q_val_${i}" name="q_val_${i}" ${isOptional ? '' : 'required'}>`;
        }
        
        html += `</div>`;
        container.innerHTML += html;
        
        questionsConfig.push({ id: `q_val_${i}`, isOptional: isOptional });
      });
    }

    function handleFormSubmit(form) {
      // PASS 2 VALIDATION: Check for untouched sentinels and optional skips
      questionsConfig.forEach(q => {
        const targetInput = document.getElementById(q.id);
        let isUntouched = false;

        if (targetInput) {
          // Check if it's a slider sitting on a float value (untouched)
          if (targetInput.type === 'range' && targetInput.value.includes('.')) {
            isUntouched = true;
          } 
          // Check if it's an empty text/radio
          else if (!targetInput.value) {
            isUntouched = true;
          }
        }

        if (isUntouched) {
          if (q.isOptional) {
            // Dynamically inject "Skipped" for the backend
            const hiddenSkipped = document.createElement('input');
            hiddenSkipped.type = 'hidden';
            hiddenSkipped.name = targetInput.name; 
            hiddenSkipped.value = 'Skipped';
            form.appendChild(hiddenSkipped);
            
            // Prevent the original empty input from sending data
            targetInput.removeAttribute('name'); 
          } else {
            // Failsafe for required questions
            alert("Please ensure all required questions are answered.");
            return false;
          }
        }
      });

      // UI Updates
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerText = "Saving...";

      setTimeout(() => {
        document.getElementById('formContent').style.display = 'none';
        
        let bodyContent = currentSessionData.emailBody;
        if (bodyContent && bodyContent.trim().length > 0) {
          const container = document.getElementById('resourceContainer');
          const textDiv = document.getElementById('resourceText');
          bodyContent = bodyContent.replace(/^["“”]+|["“”]+$/g, '');
          let html = bodyContent.replace(/\[([^,]+),\s*([^\]]+)\]/g, `<a href="$2" target="_blank" class="resource-btn">$1</a>`);
          textDiv.innerHTML = html.replace(/\n/g, '<br>');
          container.classList.remove('hidden');
        }

        document.getElementById('successMsg').classList.remove('hidden');
        window.scrollTo(0,0);
      }, 1000);

      return true; 
    }
  </script>
</body>
</html>
